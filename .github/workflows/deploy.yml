# Deploy pipeline (#47) — Push for Fulfillment community platform.
#
# REAL deploy model (audit HIGH — docs/CI previously said the backend target was
# "undecided", but it has shipped for a while): everything lives on ONE Firebase
# project. The Next.js frontend is on Firebase Hosting; the Express backend runs
# as a 2nd-gen Cloud Function named `api` (backend/src/function.ts), reached
# same-origin via the Hosting `/api/** -> api` rewrite in firebase.json. So a
# single framework-aware `firebase deploy` ships hosting + functions, and we add
# firestore rules + indexes so security-rule / index changes actually reach prod
# (previously the pipeline deployed ONLY hosting, so rules/indexes/backend never
# shipped from CI).
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   FIREBASE_SERVICE_ACCOUNT  — JSON key of a service account with
#                               "Firebase Hosting Admin" + "Cloud Functions Admin"
#                               + "Cloud Datastore Owner" (rules/indexes) +
#                               "Service Account User".
#   FIREBASE_PROJECT_ID       — e.g. push-for-fulfillment-staging (see .firebaserc).
#   NEXT_PUBLIC_API_BASE_URL  — public URL the frontend calls the backend at
#                               (empty/relative "/api" for the same-origin rewrite).

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Avoid overlapping deploys racing each other.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── One framework-aware deploy: Hosting + Functions + Firestore rules/indexes ─
  deploy:
    name: Build & deploy (Hosting + Functions + Firestore rules/indexes)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: '**/package-lock.json'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}

      # The functions deploy runs the backend build via firebase.json's
      # functions.predeploy, which needs the backend deps present.
      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Write Firebase service account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "${{ runner.temp }}/firebase-sa.json"

      - name: Deploy Hosting + Functions + Firestore rules & indexes
        # Framework-aware: firebase.json hosting.source -> frontend/ (Next.js),
        # functions codebase -> backend/ (the `api` function). One command ships
        # the whole stack plus the security rules + composite indexes.
        run: |
          npm install -g firebase-tools
          firebase experiments:enable webframeworks
          firebase deploy \
            --only hosting,functions,firestore:rules,firestore:indexes \
            --project "$FIREBASE_PROJECT_ID" \
            --non-interactive
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
          FIREBASE_CLI_EXPERIMENTS: webframeworks
