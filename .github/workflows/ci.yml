name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    # `next build` evaluates pages at build time; the Firebase web SDK init needs
    # these public NEXT_PUBLIC_* values or it throws auth/invalid-api-key. They
    # are public client config (safe in CI). If a secret is unset the value is
    # empty and firebase.ts falls back to a placeholder so the build still passes.
    env:
      NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend:
    name: Backend lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      # Audit HIGH: the backend ships a real Jest suite (lib/*.test.ts —
      # matcher, availability, displayId, stats) but CI never ran it, so "green
      # CI" overstated the guarantee. Run it before any merge to main.
      - run: npm test

  rules:
    name: Firestore + Storage rules unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Java (required by Firebase emulators)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install test dependencies
        # @firebase/rules-unit-testing@4 peer-wants firebase@11 but the repo
        # pins firebase@10; --legacy-peer-deps installs the compatible tree.
        run: npm install --legacy-peer-deps
        working-directory: tests

      - name: Run rules tests
        # Use firebase.emulators.json (no hosting block) so emulators:exec does
        # not try to emulate the Next.js web framework; runs from repo root so
        # the rules files resolve. Covers both Firestore and Storage rules.
        run: npm run test:rules
        env:
          FIREBASE_PROJECT_ID: demo-test
